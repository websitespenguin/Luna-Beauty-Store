<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7fb"/>
      <stop offset="55%" stop-color="#ffe8f1"/>
      <stop offset="100%" stop-color="#fffdf7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#d4729a" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="900" height="900" rx="70" fill="url(#bg)"/>
  <circle cx="700" cy="170" r="92" fill="#ffd3e4" opacity=".55"/>
  <circle cx="170" cy="720" r="135" fill="#fff" opacity=".75"/>
  
  <g filter="url(#shadow)">
    <rect x="250" y="220" width="140" height="470" rx="45" fill="#ffb4c8"/>
    <rect x="272" y="330" width="96" height="310" rx="35" fill="#ff668b" opacity=".55"/>
    <rect x="250" y="165" width="140" height="95" rx="35" fill="#ffd1dc"/>
    <rect x="510" y="265" width="140" height="410" rx="45" fill="#ffd1dc"/>
    <rect x="552" y="165" width="55" height="230" rx="25" fill="#fff"/>
    <ellipse cx="580" cy="155" rx="58" ry="105" fill="#ffc1d1" transform="rotate(-8 580 155)"/>
    <text x="322" y="510" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#ffffff" transform="rotate(-90 322 510)">SHEGLAM</text>
  </g>

  <text x="450" y="825" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#5a253c">Gloss Pink</text>
</svg>